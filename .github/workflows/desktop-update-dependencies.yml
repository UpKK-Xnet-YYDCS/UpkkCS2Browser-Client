name: Desktop Update Dependencies

on:
  schedule:
    # Run every Monday at 01:00 UTC (after Go dependency update at 00:00)
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-desktop-dependencies:
    runs-on: ubuntu-latest
    steps:
      # Generate a GitHub App token to bypass PR creation restrictions
      # Falls back to GITHUB_TOKEN if APP_ID and APP_PRIVATE_KEY secrets are not set
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
        continue-on-error: true

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # ── Frontend (npm) dependencies ──────────────────────────
      - name: Update npm dependencies
        working-directory: desktop
        run: |
          echo "=== Current npm dependency versions ==="
          npm outdated || true
          echo ""

          echo "=== Upgrading package.json versions ==="
          npx --yes npm-check-updates -u --target minor
          echo ""

          echo "=== Installing updated packages ==="
          npm install
          echo ""

          echo "=== Verify Tauri stays at 2.x and React stays at 19.x ==="
          node -e "
            const pkg = require('./package.json');
            const deps = { ...pkg.dependencies, ...pkg.devDependencies };
            function getMajor(v) { return parseInt(v.replace(/^[\^~>=<]*/, '').split('.')[0], 10); }

            const tauriPkgs = Object.entries(deps).filter(([k]) => k.includes('tauri'));
            tauriPkgs.forEach(([name, version]) => {
              const major = getMajor(version);
              console.log(name + ': ' + version + ' (major: ' + major + ')');
              if (major >= 3) {
                console.error('ERROR: ' + name + ' upgraded to v' + major + '! Must stay at v2.x');
                process.exit(1);
              }
            });
            console.log('All Tauri packages remain at v2.x ✓');

            const reactVer = deps['react'];
            if (reactVer) {
              const major = getMajor(reactVer);
              console.log('react: ' + reactVer + ' (major: ' + major + ')');
              if (major >= 20) {
                console.error('ERROR: React upgraded to v' + major + '! Must stay at v19.x');
                process.exit(1);
              }
              console.log('React remains at v19.x ✓');
            }
          "

      # ── Rust (Cargo) dependencies ───────────────────────────
      - name: Update Cargo dependencies
        working-directory: desktop/src-tauri
        run: |
          echo "=== Updating Cargo.lock (within current version constraints) ==="
          cargo update 2>&1
          echo ""

          echo "=== Installing cargo-edit for Cargo.toml upgrades ==="
          cargo install cargo-edit --quiet 2>&1
          echo ""

          echo "=== Upgrading Cargo.toml dependency versions ==="
          cargo upgrade 2>&1
          echo ""

          echo "=== Verify Tauri stays at 2.x ==="
          TAURI_VER=$(grep '^tauri ' Cargo.toml | head -1 | grep -oP '\d+\.\d+\.\d+' || grep '^tauri ' Cargo.toml | head -1)
          TAURI_MAJOR=$(echo "$TAURI_VER" | grep -oP '^\d+')
          echo "Tauri version in Cargo.toml: $TAURI_VER (major: $TAURI_MAJOR)"
          if [ "$TAURI_MAJOR" -ge 3 ] 2>/dev/null; then
            echo "ERROR: Tauri upgraded to v${TAURI_MAJOR}! Must stay at v2.x"
            exit 1
          fi

          TAURI_BUILD_VER=$(grep 'tauri-build' Cargo.toml | grep -oP '\d+\.\d+\.\d+' || true)
          echo "tauri-build version: $TAURI_BUILD_VER"

          echo "All Tauri crates remain at v2.x ✓"
          echo ""

          echo "=== Final Cargo.lock update ==="
          cargo update 2>&1

      # ── Check for changes and create PR ─────────────────────
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No dependency changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "=== Changed files ==="
            git diff --stat
            echo ""
            echo "=== npm package changes ==="
            git diff desktop/package.json | head -80 || true
            echo ""
            echo "=== Cargo.toml changes ==="
            git diff desktop/src-tauri/Cargo.toml | head -80 || true
          fi

      - name: Generate change summary
        if: steps.changes.outputs.has_changes == 'true'
        id: summary
        working-directory: desktop
        run: |
          {
            echo "summary<<EOF"

            if ! git diff --quiet package.json; then
              echo "#### 📦 npm (Frontend)"
              echo '```'
              git diff package.json | grep '^[+-]' | grep -v '^[+-][+-][+-]' | head -40
              echo '```'
              echo ""
            fi

            if ! git diff --quiet src-tauri/Cargo.toml; then
              echo "#### 🦀 Cargo (Rust)"
              echo '```'
              git diff src-tauri/Cargo.toml | grep '^[+-]' | grep -v '^[+-][+-][+-]' | head -40
              echo '```'
              echo ""
            fi

            if ! git diff --quiet package-lock.json; then
              echo "- 📄 package-lock.json updated"
            fi
            if ! git diff --quiet src-tauri/Cargo.lock; then
              echo "- 📄 Cargo.lock updated"
            fi

            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.generate-token.outputs.token || secrets.GITHUB_TOKEN }}
          commit-message: "chore(desktop-deps): update desktop dependencies (${{ steps.date.outputs.date }})"
          title: "chore(desktop-deps): Update desktop dependencies (${{ steps.date.outputs.date }})"
          body: |
            ## 🖥️ Desktop Dependency Update / 桌面端依赖更新

            This PR was automatically created by the desktop dependency update workflow.
            此 PR 由桌面端依赖更新工作流自动创建。

            ### Changes / 变更

            ${{ steps.summary.outputs.summary }}

            ### Constraints / 约束
            - ✅ Tauri remains at **2.x** / Tauri 保持 **2.x**
            - ✅ React remains at **19.x** / React 保持 **19.x**
            - Updates are within compatible versions to avoid breaking changes
            - 更新保持在兼容版本内，避免破坏性变更

            ### Date / 日期
            ${{ steps.date.outputs.date }}

            ---
            **Next Steps / 后续步骤:**
            1. Review the changes in the Files Changed tab / 查看文件变更
            2. Ensure the desktop build passes / 确保桌面端构建通过
            3. Merge if everything looks good / 一切正常则合并
          branch: deps/update-desktop-dependencies
          delete-branch: true
          labels: |
            dependencies
            automated
            desktop
